name: FFE Database Update

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ffe-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install requests

      # Generate the database in the workspace first.
      # If this step fails, the ffe-database branch is never touched.
      - name: Generate FFE SQLite database
        run: python scripts/ffe/generate_ffe_sqlite.py

      - name: Publish to ffe-database branch
        run: |
          DB_FILENAME=$(python -c "from scripts.ffe.generate_ffe_sqlite import DB_FILENAME; print(DB_FILENAME)")
          cd /tmp
          git init ffe-db
          cd ffe-db
          git checkout --orphan ffe-database
          cp $GITHUB_WORKSPACE/$DB_FILENAME .
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add "$DB_FILENAME"
          git commit -m "Update FFE database"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push --force origin ffe-database

  publish-linux-flatpak:
    name: Publish Linux Flatpak to GitHub Pages
    needs: [export-sharly-chess-linux]
    runs-on: ubuntu-latest
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4.2.2
        with:
          ref: gh-pages
          path: flatpak-repo-publish
      - name: Download x86_64 OSTree
        uses: actions/download-artifact@v4
        with:
          name: ostree-x86_64
      - name: Download arm64 OSTree
        uses: actions/download-artifact@v4
        with:
          name: ostree-arm64
      - name: Install OSTree tools
        run: sudo apt-get update && sudo apt-get install -y flatpak flatpak-builder ostree
      - name: Set version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.ref_name }}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: gpg --batch --import <(echo "$GPG_PRIVATE_KEY")
      - name: Merge OSTree repositories and sign
        shell: bash
        run: |
          # Initialize the target repo if it doesn't exist
          if [ ! -d "flatpak-repo-publish/repo" ]; then
            ostree init --mode=archive-z2 --repo=flatpak-repo-publish/repo
          else
            mkdir -p flatpak-repo-publish/repo/refs/remotes
            mkdir -p flatpak-repo-publish/repo/refs/heads
          fi

          merge_repo() {
            local SOURCE_REPO=$1
            local ARCH=$2
            local REF="app/com.sharlychess.SharlyChess/${ARCH}/master"
            echo "Merging $ARCH..."
            flatpak build-commit-from --force \
              --src-repo=$SOURCE_REPO \
              --src-ref=$REF \
              --subject="Version ${VERSION} ($ARCH)" \
              --body="Automated build from GitHub Actions" \
              flatpak-repo-publish/repo $REF
          }

          mkdir repo-x86 && tar -xzf repo-x86_64.tar.gz -C repo-x86
          merge_repo repo-x86/repo-staging x86_64

          mkdir repo-arm && tar -xzf repo-arm64.tar.gz -C repo-arm
          merge_repo repo-arm/repo-staging aarch64

          # Get GPG key ID
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep "^sec" | cut -d: -f5 | head -n 1)
          if [ -z "$GPG_KEY_ID" ]; then echo "Error: GPG key not found"; exit 1; fi
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

          # Sign application commits
          flatpak build-sign flatpak-repo-publish/repo com.sharlychess.SharlyChess \
            --gpg-sign="$GPG_KEY_ID" --gpg-homedir="$HOME/.gnupg"

          # Update repo summary with static deltas and sign
          flatpak build-update-repo \
            --generate-static-deltas \
            --prune \
            --prune-depth=5 \
            --gpg-sign="$GPG_KEY_ID" \
            --gpg-homedir="$HOME/.gnupg" \
            flatpak-repo-publish/repo

          # Generate from-empty deltas for faster first install
          for ARCH in x86_64 aarch64; do
            REF="app/com.sharlychess.SharlyChess/${ARCH}/master"
            if ostree rev-parse --repo=flatpak-repo-publish/repo $REF 2>/dev/null; then
              echo "Generating from-empty delta for $ARCH..."
              ostree static-delta generate --repo=flatpak-repo-publish/repo --empty $REF
            fi
          done

          # Re-sign after adding from-empty deltas
          flatpak build-update-repo \
            --gpg-sign="$GPG_KEY_ID" \
            --gpg-homedir="$HOME/.gnupg" \
            flatpak-repo-publish/repo
      - name: Generate .flatpakrepo files
        shell: bash
        run: |
          touch flatpak-repo-publish/.nojekyll
          gpg --export --export-options export-minimal "$GPG_KEY_ID" > public.gpg
          if [ ! -s public.gpg ]; then echo "Error: empty public key"; exit 1; fi
          GPG_BASE64=$(base64 -w 0 public.gpg)
          rm public.gpg

          cat > flatpak-repo-publish/sharly-chess.flatpakrepo <<EOF
          [Flatpak Repo]
          Title=Sharly Chess
          Url=https://flatpak.sharly-chess.com/repo/
          Homepage=https://github.com/Sharly-Chess/sharly-chess
          Comment=Official repository for Sharly Chess
          Description=Play chess and manage tournaments with Sharly Chess
          GPGKey=$GPG_BASE64
          EOF

      - name: Push to GitHub Pages
        working-directory: flatpak-repo-publish
        shell: bash
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          COMMIT_MSG="Publish Version ${VERSION}"
          git commit -m "$COMMIT_MSG"

          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            if git push origin gh-pages; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), rebasing..."
            git rebase --abort 2>/dev/null || true
            git fetch origin gh-pages
            git reset --soft origin/gh-pages
            git add .
            git commit -m "$COMMIT_MSG" || echo "Nothing new to commit"
          done
          echo "ERROR: Push failed after $MAX_RETRIES attempts"
          exit 1


name: Sharly-Chess export

on:
  push:
    tags:
      - "*"

jobs:
  export-sharly-chess:
    runs-on: windows-latest
    steps:
      - name: Get current date
        id: date
        uses: Kaven-Universe/github-action-current-date-time@v1
        with:
          format: "YYYY_MM_DD HH_mm_ss_SSS"
      - name: checkout
        uses: actions/checkout@4.2.2
      - name: Setup Python
        uses: actions/setup-python@v5.5.0
        with:
          # Version range or exact version of Python or PyPy to use, using SemVer's version range syntax. Reads from .python-version if unset.
          python-version: 3.12
      - name: Install dependencies and export
        shell: pwsh
        env:
          FFE_HOST: ${{ secrets.FFE_HOSTNAME }}
          FFE_USER: ${{ secrets.FFE_USER }}
          FFE_PASSWORD: ${{ secrets.FFE_PASSWORD }}
          FFE_DATABASE: ${{ secrets.FFE_DATABASE }}
        run: |
          pip install -e .[export]
          python scripts/i18n/i18n_check.py
          python scripts/ffe/generate_ffe_sql_server_credentials.py --github --host="$env:FFE_HOST" --user="$env:FFE_USER" --password="$env:FFE_PASSWORD" --database="$env:FFE_DATABASE"
          python scripts/export/export.py --github="${{ github.ref_name }}"
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Version ${{ github.ref_name }} (${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }})"
          draft: true
          prerelease: contains("a", ${{ github.ref_name }}) || contains("b", ${{ github.ref_name }}) || contains("rc", ${{ github.ref_name }})
          files: |
            export/papi-web-${{ github.ref_name }}.zip
          body: "
## Fonctionnement

- Déplacement des utilitaires de ``bin/`` vers ``tools/`` (2.6.0)

## Interface web

- Simplification du menu principal (2.6.0)

### Gestion des appariements

- Ajout de l'onglet Appariements (2.6.0)
- Ajout de la gestion des appariements manuels (2.6.0)
- Ajout de l'appariement suisse (2.6.0 expérimental)
- Ajout des exports PGN et TRF16 (2.6.0 expérimental)

### Gestion des clients

- Ajout des contrôleurs de clients (2.6.0)
"

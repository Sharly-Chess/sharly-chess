name: Full Tests

permissions:
  contents: read

# NOTE(Amaras): This workflow file was generated by AI (GitHub Copilot, GPT-4.1).

on:
    # schedule:
    #     - cron: '0 2 * * *'  # 2 AM UTC
    workflow_call:
    workflow_dispatch:

jobs:
    full-test:
        runs-on: windows-latest
        defaults:
            run:
                shell: pwsh

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.12'

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -e .[tests,lint]

            - name: Run i18n_update
              run: |
                python scripts/i18n/i18n_update.py

            - name: Run Mypy
              run: |
                mypy src

            - name: Install Playwright browsers
              run: |
                python -m playwright install --with-deps chromium

            - name: Run all tests
              run: pytest

name: Full Tests

permissions:
  contents: read

# NOTE(Amaras): This workflow file was generated by AI (GitHub Copilot, GPT-4.1).

on:
    schedule:
        - cron: '0 2 * * *'  # 2 AM UTC
    push:
        tags:
            - "*"
    workflow_dispatch:

jobs:
    full-test:
        runs-on: windows-latest
        defaults:
            run:
                shell: pwsh

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.12'

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -e .[tests]

            - name: Install Playwright browsers
              run: |
                python -m playwright install --with-deps

            - name: Download Access Database Engine
              run: |
                Invoke-WebRequest -Uri "https://download.microsoft.com/download/3/5/c/35c84c36-661a-44e6-9324-8786b8dbe231/accessdatabaseengine_X64.exe" -OutFile "accessdatabaseengine_X64.exe"

            - name: Install Access Database Engine
              run: |
                Start-Process -FilePath ".\accessdatabaseengine_X64.exe" -ArgumentList "/quiet" -Wait

            - name: Run all tests
              run: pytest

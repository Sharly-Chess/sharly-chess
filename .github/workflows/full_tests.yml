name: Full Tests

permissions:
  contents: read

# NOTE(Amaras): This workflow file was generated by AI (GitHub Copilot, GPT-4.1).

on:
    push:
        branches:
            - dev
    workflow_dispatch:

jobs:
    full-test:
        runs-on: windows-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.12'

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -e .[tests]

            - name: Install Playwright browsers
              run: |
                python -m playwright install --with-deps

            - name: Run all tests
              run: pytest
              shell: pwsh

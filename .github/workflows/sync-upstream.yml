# Sync Upstream Releases
# Ce workflow vérifie périodiquement les nouvelles releases stables upstream,
# les merge dans linux-flatpak, et déclenche le build de production automatiquement.
# Les pre-releases (betas) sont ignorées.
#
# Flux :
#   1. Détecte la dernière release stable upstream (isPrerelease=false, isLatest=true)
#   2. Merge le tag dans linux-flatpak
#   3. Met à jour l'appdata.xml avec les release notes upstream
#   4. Push → déclenche un build dev automatique
#   5. Déclenche le build production via workflow_dispatch
#   6. Crée une Issue GitHub pour traçabilité

name: Sync Upstream Release

on:
  schedule:
    # Toutes les 6 heures
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Tag upstream spécifique à syncer (ex: 3.6.0). Laisser vide pour détecter automatiquement la dernière release stable.'
        required: false
        type: string
      skip_production:
        description: 'Ne pas déclencher le build production (merge + dev build uniquement)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout linux-flatpak
        uses: actions/checkout@v4
        with:
          ref: linux-flatpak
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Sharly-Chess/sharly-chess.git || true
          # --force to overwrite local tags that diverge from upstream (e.g. after history rewrite)
          git fetch upstream --tags --force

      - name: Determine release to sync
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.upstream_tag }}" ]; then
            TARGET_TAG="${{ inputs.upstream_tag }}"
            echo "Mode: manual dispatch for tag $TARGET_TAG"

            # Chercher si c'est une pre-release ou pas
            RELEASE_JSON=$(gh api "repos/Sharly-Chess/sharly-chess/releases/tags/$TARGET_TAG" 2>/dev/null || echo "")
            if [ -n "$RELEASE_JSON" ]; then
              IS_PRERELEASE=$(echo "$RELEASE_JSON" | jq -r '.prerelease')
              RELEASE_NAME=$(echo "$RELEASE_JSON" | jq -r '.name')
              RELEASE_BODY=$(echo "$RELEASE_JSON" | jq -r '.body // ""')
            else
              IS_PRERELEASE="false"
              RELEASE_NAME="Manual sync $TARGET_TAG"
              RELEASE_BODY=""
            fi
          else
            echo "Mode: auto-detect new releases from upstream..."

            # Récupérer les 5 dernières releases (stables + pre-releases)
            RELEASES=$(gh api "repos/Sharly-Chess/sharly-chess/releases?per_page=5" 2>/dev/null || echo "[]")

            # Chercher la première release (stable ou pre-release) qui n'est pas encore mergée
            TARGET_TAG=""
            IS_PRERELEASE="false"
            RELEASE_NAME=""
            RELEASE_BODY=""

            for i in $(seq 0 4); do
              TAG=$(echo "$RELEASES" | jq -r ".[$i].tag_name // empty")
              [ -z "$TAG" ] && continue

              PRERELEASE=$(echo "$RELEASES" | jq -r ".[$i].prerelease")
              DRAFT=$(echo "$RELEASES" | jq -r ".[$i].draft")
              NAME=$(echo "$RELEASES" | jq -r ".[$i].name")

              # Ignorer les drafts
              [ "$DRAFT" = "true" ] && continue

              # Vérifier si ce tag existe localement
              if ! git rev-parse "$TAG" >/dev/null 2>&1; then
                echo "Tag $TAG not found locally, skipping"
                continue
              fi

              # Vérifier si déjà mergé
              # If a newer release is already merged, all older ones are covered → stop
              if git merge-base --is-ancestor "$TAG" HEAD 2>/dev/null; then
                echo "Tag $TAG already merged — older releases are covered, stopping search"
                break
              fi

              # Trouvé ! C'est la release la plus récente non encore mergée
              TARGET_TAG="$TAG"
              IS_PRERELEASE="$PRERELEASE"
              RELEASE_NAME="$NAME"
              RELEASE_BODY=$(echo "$RELEASES" | jq -r ".[$i].body // \"\"")
              echo "Found new release: $NAME (tag: $TAG, prerelease: $IS_PRERELEASE)"
              break
            done

            if [ -z "$TARGET_TAG" ]; then
              echo "No new release to sync"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          if [ -z "$TARGET_TAG" ]; then
            echo "No tag found"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "skip=false" >> $GITHUB_OUTPUT
          echo "tag=$TARGET_TAG" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "release_body_b64=$(echo "$RELEASE_BODY" | base64 -w 0)" >> $GITHUB_OUTPUT

          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "→ Pre-release: will sync to dev only (no production build)"
          else
            echo "→ Stable release: will sync to dev + production"
          fi

      - name: Attempt merge
        if: steps.detect.outputs.skip != 'true'
        id: merge
        run: |
          TAG="${{ steps.detect.outputs.tag }}"
          echo "Merging tag $TAG into linux-flatpak..."

          # Tenter le merge
          if git merge "$TAG" --no-edit -m "Merge upstream tag $TAG into linux-flatpak"; then
            echo "Merge successful"
            echo "success=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            echo "Merge failed (conflicts detected)"
            git merge --abort
            echo "success=false" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT

            # Lister les fichiers en conflit pour le diagnostic
            git merge "$TAG" --no-edit -m "Merge upstream tag $TAG" 2>&1 || true
            CONFLICTS=$(git diff --name-only --diff-filter=U 2>/dev/null || echo "unknown")
            git merge --abort 2>/dev/null || true
            echo "conflicts<<EOF" >> $GITHUB_OUTPUT
            echo "$CONFLICTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Update appdata version
        if: steps.merge.outputs.success == 'true' && steps.detect.outputs.is_prerelease != 'true'
        run: |
          TAG="${{ steps.merge.outputs.tag }}"
          TODAY=$(date +%Y-%m-%d)
          RELEASE_BODY_B64="${{ steps.detect.outputs.release_body_b64 }}"

          # Vérifier si cette version existe déjà dans appdata
          APPDATA="flatpak/configuration/com.sharlychess.SharlyChess.appdata.xml"
          if grep -q "version=\"$TAG\"" "$APPDATA"; then
            echo "Version $TAG already in appdata.xml, skipping"
          else
            echo "Adding version $TAG to appdata.xml..."

            # Décoder les release notes upstream
            if [ -n "$RELEASE_BODY_B64" ]; then
              RELEASE_BODY=$(echo "$RELEASE_BODY_B64" | base64 -d)
            else
              RELEASE_BODY=""
            fi

            # Utiliser python pour insérer le XML avec les release notes upstream
            python3 << 'PYEOF'
          import sys, os, re

          tag = os.environ.get('TAG', '')
          date = os.environ.get('TODAY', '')
          body = os.environ.get('RELEASE_BODY', '')

          # Extraire les items des release notes markdown
          items = []
          if body:
              for line in body.split('\n'):
                  line = line.strip()
                  # Chercher les lignes "- item (version)" ou "- item"
                  m = re.match(r'^[-*]\s+(.+?)(?:\s*\(\d+\.\d+\.\d+\))?$', line)
                  if m:
                      text = m.group(1).strip()
                      # Nettoyer le markdown
                      text = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', text)
                      if text and len(text) > 3:
                          items.append(text)

          if not items:
              items = ['See upstream release notes for details']

          # Limiter à 10 items max
          items = items[:10]
          li_items = '\n'.join(f'            <li>{item}</li>' for item in items)

          new_entry = f'''    <release version="{tag}" date="{date}">
                <description>
                  <p>Release {tag}</p>
                  <ul>
          {li_items}
                  </ul>
                </description>
              </release>'''

          path = 'flatpak/configuration/com.sharlychess.SharlyChess.appdata.xml'
          with open(path) as f:
              content = f.read()
          content = content.replace('<releases>', '<releases>\n' + new_entry, 1)
          with open(path, 'w') as f:
              f.write(content)
          PYEOF

            git add "$APPDATA"
            git commit -m "Update appdata for $TAG release"
          fi

      - name: Push merged branch
        if: steps.merge.outputs.success == 'true'
        run: |
          git push origin linux-flatpak
          echo "Pushed merged linux-flatpak — dev build will trigger automatically"

      - name: Trigger production build
        if: steps.merge.outputs.success == 'true' && steps.detect.outputs.is_prerelease != 'true' && inputs.skip_production != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.merge.outputs.tag }}"
          echo "Triggering production build for $TAG..."
          gh workflow run publish-multiarch.yml \
            -R "${{ github.repository }}" \
            --ref linux-flatpak \
            -f version_tag="$TAG"
          echo "Production build triggered for $TAG"

      - name: Create success issue
        if: steps.merge.outputs.success == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.merge.outputs.tag }}';
            const releaseName = '${{ steps.detect.outputs.release_name }}';
            const isPrerelease = '${{ steps.detect.outputs.is_prerelease }}' === 'true';
            const skipProd = '${{ inputs.skip_production }}' === 'true';

            let prodStatus;
            if (isPrerelease) {
              prodStatus = '- ℹ️ Pre-release: dev build only (no production)';
            } else if (skipProd) {
              prodStatus = '- ⏭️ Production build skipped (manual mode)';
            } else {
              prodStatus = '- 🚀 Production build triggered automatically';
            }

            const releaseType = isPrerelease ? 'pre-release' : 'stable release';
            const titleStatus = isPrerelease ? 'dev build' : (skipProd ? 'dev only' : 'production build triggered');
            const labels = isPrerelease
              ? ['upstream-sync', 'pre-release']
              : ['upstream-sync', 'release'];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `✅ Upstream ${tag} synced — ${titleStatus}`,
              body: `## Upstream ${releaseType} synced: ${releaseName}\n\n` +
                `The ${releaseType} \`${tag}\` from upstream has been automatically merged into \`linux-flatpak\`.\n\n` +
                `### What happened\n` +
                `- ✅ Merge completed without conflicts\n` +
                (isPrerelease ? '' : '- ✅ Appdata updated with upstream release notes\n') +
                `- ✅ Dev build triggered automatically (publishes to \`repo-dev/\`)\n` +
                `${prodStatus}\n\n` +
                `### Verify\n` +
                `1. Check the [workflow runs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions) for build status\n` +
                `2. Test on your Linux machine:\n` +
                `   \`\`\`bash\n` +
                `   flatpak update --user  # if using dev channel\n` +
                `   \`\`\`\n\n` +
                `### Upstream release\n` +
                `See: https://github.com/Sharly-Chess/sharly-chess/releases/tag/${tag}`,
              labels: labels
            });

      - name: Create conflict issue
        if: steps.merge.outputs.success == 'false'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.merge.outputs.tag }}';
            const conflicts = `${{ steps.merge.outputs.conflicts }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Merge conflict on upstream ${tag}`,
              body: `## Merge conflict detected\n\n` +
                `Upstream tag \`${tag}\` could not be automatically merged into \`linux-flatpak\`.\n\n` +
                `### Conflicting files\n` +
                `\`\`\`\n${conflicts}\n\`\`\`\n\n` +
                `### Manual resolution required\n` +
                `\`\`\`bash\n` +
                `git fetch upstream --tags\n` +
                `git checkout linux-flatpak\n` +
                `git merge ${tag}\n` +
                `# Resolve conflicts...\n` +
                `git add .\n` +
                `git commit\n` +
                `git push\n` +
                `\`\`\`\n\n` +
                `### Upstream changes\n` +
                `See: https://github.com/Sharly-Chess/sharly-chess/releases/tag/${tag}`,
              labels: ['upstream-sync', 'conflict', 'manual-action']
            });

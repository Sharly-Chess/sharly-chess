name: Publish Multi-Arch Flatpak Repo

on:
  push:
    branches:
      - linux-flatpak
    tags:
      - '*'
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'flatpak/documentation/**'
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag to rebuild for production (e.g., 3.5.2). Leave empty for dev build.'
        required: false
        default: ''

jobs:
  # ==================================================================================
  # JOB 1: BUILD x86_64
  # ==================================================================================
  build-x86:
    name: Build x86_64
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.derive_version.outputs.version }}
    env:
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
      LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
      ARCH: x86_64
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # Always checkout the branch — version_tag is for versioning only,
          # the tag content is already merged into the branch by sync-upstream
          ref: ${{ github.ref }}

      - name: Set up environment variables
        run: |
          echo "FLATPAK_USER_DIR=${{ github.workspace }}/.flatpak" >> $GITHUB_ENV
          echo "XDG_RUNTIME_DIR=${{ runner.temp }}/flatpak-runtime" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream-util libcairo2-dev libgirepository1.0-dev libgirepository-2.0-dev gir1.2-gtk-3.0 libgtk-3-dev gobject-introspection libglib2.0-dev libffi-dev ninja-build meson pkg-config build-essential

      - name: Install GNOME runtimes (49)
        run: |
          mkdir -p "$FLATPAK_USER_DIR" "$XDG_RUNTIME_DIR"
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y --noninteractive flathub org.gnome.Platform//49
          flatpak --user install -y --noninteractive flathub org.gnome.Sdk//49

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:${{ env.PKG_CONFIG_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-flatpak.txt

      - name: Derive version
        id: derive_version
        run: |
          if [[ -n "${{ inputs.version_tag }}" ]]; then
            VERSION="${{ inputs.version_tag }}"
            VERSION="${VERSION#v}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v?[0-9] ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Push on branch: extract version from pyproject.toml
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          fi
          echo "DESKTOP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Sync desktop version
        run: python scripts/sync_desktop_version.py --version "${DESKTOP_VERSION}"

      - name: Update AppData version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${{ steps.derive_version.outputs.version }}
          DATE=$(date +%Y-%m-%d)
          # Check if version already exists
          if ! grep -q "version=\"$VERSION\"" flatpak/configuration/com.sharlychess.SharlyChess.appdata.xml; then
             # Insert new release at the top of releases list
             sed -i "s|<releases>|<releases>\n    <release version=\"$VERSION\" date=\"$DATE\">\n      <description>\n        <p>New release $VERSION</p>\n      </description>\n    </release>|" flatpak/configuration/com.sharlychess.SharlyChess.appdata.xml
             echo "Added version $VERSION to AppData"
          else
             echo "Version $VERSION already in AppData"
          fi

      - name: Inject secrets
        env:
          FFE_HOST: ${{ secrets.FFE_HOSTNAME }}
          FFE_USER: ${{ secrets.FFE_USER }}
          FFE_PASSWORD: ${{ secrets.FFE_PASSWORD }}
          FFE_DATABASE: ${{ secrets.FFE_DATABASE }}
          CHESS_RESULTS_KEY: ${{ secrets.CHESS_RESULTS_AES_KEY }}
          CHESS_RESULTS_IV: ${{ secrets.CHESS_RESULTS_AES_IV }}
        run: |
          jq '(.modules |= map(if .name == "sharly-chess" then .["build-options"] += {
            "env": {
              "FFE_HOST": env.FFE_HOST,
              "FFE_USER": env.FFE_USER,
              "FFE_PASSWORD": env.FFE_PASSWORD,
              "FFE_DATABASE": env.FFE_DATABASE,
              "CHESS_RESULTS_KEY": env.CHESS_RESULTS_KEY,
              "CHESS_RESULTS_IV": env.CHESS_RESULTS_IV
            }
          } else . end))' flatpak/configuration/com.sharlychess.SharlyChess.json > manifest.tmp
          mv manifest.tmp flatpak/configuration/com.sharlychess.SharlyChess.json

      - name: Build Flatpak
        run: |
          flatpak-builder --arch=${ARCH} --repo=repo-staging --force-clean --verbose --subject="Version ${BUILD_VERSION}" build-flatpak flatpak/configuration/com.sharlychess.SharlyChess.json

      - name: Create Single-File Bundle (Backup)
        run: |
          flatpak build-bundle repo-staging com.sharlychess.SharlyChess-${BUILD_VERSION}-${ARCH}.flatpak com.sharlychess.SharlyChess --arch=${ARCH}

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-x86_64
          path: com.sharlychess.SharlyChess-*-x86_64.flatpak
          retention-days: 1

      - name: Archive OSTree Repo for Publish
        run: tar -czf repo-x86_64.tar.gz repo-staging

      - name: Upload OSTree Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ostree-x86_64
          path: repo-x86_64.tar.gz
          retention-days: 1

  # ==================================================================================
  # JOB 2: BUILD ARM64
  # ==================================================================================
  build-arm64:
    name: Build ARM64
    runs-on: ubuntu-24.04-arm
    env:
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
      LD_LIBRARY_PATH: /usr/lib/aarch64-linux-gnu
      ARCH: aarch64
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          # Always checkout the branch — version_tag is for versioning only,
          # the tag content is already merged into the branch by sync-upstream
          ref: ${{ github.ref }}

      - name: Set up environment variables
        run: |
          echo "FLATPAK_USER_DIR=${{ github.workspace }}/.flatpak" >> $GITHUB_ENV
          echo "XDG_RUNTIME_DIR=${{ runner.temp }}/flatpak-runtime" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder appstream-util libcairo2-dev libgirepository1.0-dev libgirepository-2.0-dev gir1.2-gtk-3.0 libgtk-3-dev gobject-introspection libglib2.0-dev libffi-dev ninja-build meson pkg-config build-essential

      - name: Install GNOME runtimes (49)
        run: |
          mkdir -p "$FLATPAK_USER_DIR" "$XDG_RUNTIME_DIR"
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y --noninteractive flathub org.gnome.Platform//49
          flatpak --user install -y --noninteractive flathub org.gnome.Sdk//49

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig:${{ env.PKG_CONFIG_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-flatpak.txt

      - name: Derive version
        run: |
          if [[ -n "${{ inputs.version_tag }}" ]]; then
            VERSION="${{ inputs.version_tag }}"
            VERSION="${VERSION#v}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v?[0-9] ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # Push on branch: extract version from pyproject.toml
            VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          fi
          echo "DESKTOP_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Sync desktop version
        run: python scripts/sync_desktop_version.py --version "${DESKTOP_VERSION}"

      - name: Update AppData version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=$BUILD_VERSION
          DATE=$(date +%Y-%m-%d)
          # Check if version already exists
          if ! grep -q "version=\"$VERSION\"" flatpak/configuration/com.sharlychess.SharlyChess.appdata.xml; then
             # Insert new release at the top of releases list
             sed -i "s|<releases>|<releases>\n    <release version=\"$VERSION\" date=\"$DATE\">\n      <description>\n        <p>New release $VERSION</p>\n      </description>\n    </release>|" flatpak/configuration/com.sharlychess.SharlyChess.appdata.xml
             echo "Added version $VERSION to AppData"
          else
             echo "Version $VERSION already in AppData"
          fi

      - name: Inject secrets
        env:
          FFE_HOST: ${{ secrets.FFE_HOSTNAME }}
          FFE_USER: ${{ secrets.FFE_USER }}
          FFE_PASSWORD: ${{ secrets.FFE_PASSWORD }}
          FFE_DATABASE: ${{ secrets.FFE_DATABASE }}
          CHESS_RESULTS_KEY: ${{ secrets.CHESS_RESULTS_AES_KEY }}
          CHESS_RESULTS_IV: ${{ secrets.CHESS_RESULTS_AES_IV }}
        run: |
          jq '(.modules |= map(if .name == "sharly-chess" then .["build-options"] += {
            "env": {
              "FFE_HOST": env.FFE_HOST,
              "FFE_USER": env.FFE_USER,
              "FFE_PASSWORD": env.FFE_PASSWORD,
              "FFE_DATABASE": env.FFE_DATABASE,
              "CHESS_RESULTS_KEY": env.CHESS_RESULTS_KEY,
              "CHESS_RESULTS_IV": env.CHESS_RESULTS_IV
            }
          } else . end))' flatpak/configuration/com.sharlychess.SharlyChess.json > manifest.tmp
          mv manifest.tmp flatpak/configuration/com.sharlychess.SharlyChess.json

      - name: Build Flatpak
        run: |
          flatpak-builder --arch=${ARCH} --repo=repo-staging --force-clean --verbose --subject="Version ${BUILD_VERSION}" build-flatpak flatpak/configuration/com.sharlychess.SharlyChess.json

      - name: Create Single-File Bundle (Backup)
        run: |
          flatpak build-bundle repo-staging com.sharlychess.SharlyChess-${BUILD_VERSION}-${ARCH}.flatpak com.sharlychess.SharlyChess --arch=${ARCH}

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-arm64
          path: com.sharlychess.SharlyChess-*-aarch64.flatpak
          retention-days: 1

      - name: Archive OSTree Repo for Publish
        run: tar -czf repo-arm64.tar.gz repo-staging

      - name: Upload OSTree Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ostree-arm64
          path: repo-arm64.tar.gz
          retention-days: 1

  # ==================================================================================
  # JOB 3: PUBLISH (MERGE & PUSH)
  # ==================================================================================
  publish:
    name: Publish to GitHub Pages
    needs: [build-x86, build-arm64]
    # Run only on tags or manual dispatch to avoid publishing every commit
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/linux-flatpak'
    runs-on: ubuntu-24.04
    # Serialize all publish jobs to prevent binary merge conflicts on gh-pages
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Checkout Flatpak Repo (gh-pages)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: flatpak-repo-publish

      - name: Download x86_64 OSTree
        uses: actions/download-artifact@v4
        with:
          name: ostree-x86_64

      - name: Download ARM64 OSTree
        uses: actions/download-artifact@v4
        with:
          name: ostree-arm64

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder ostree

      - name: Determine target repository
        run: |
          IS_PRODUCTION=false
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            IS_PRODUCTION=true
            echo "Trigger: tag push → production (repo/)"
          elif [[ -n "${{ inputs.version_tag }}" ]]; then
            IS_PRODUCTION=true
            echo "Trigger: workflow_dispatch with version_tag=${{ inputs.version_tag }} → production (repo/)"
          else
            echo "Trigger: branch push or manual → dev (repo-dev/)"
          fi
          if [ "$IS_PRODUCTION" = true ]; then
            REPO_DIR="repo"
          else
            REPO_DIR="repo-dev"
          fi
          echo "REPO_DIR=$REPO_DIR" >> $GITHUB_ENV
          echo "IS_PRODUCTION=$IS_PRODUCTION" >> $GITHUB_ENV
          echo "Publishing to: $REPO_DIR"

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          # Utilisation de la substitution de processus pour ne pas écrire la clé sur le disque
          gpg --batch --import <(echo "$GPG_PRIVATE_KEY")

      - name: Initialize & Merge Repos
        env:
          VERSION: ${{ needs.build-x86.outputs.version }}
        run: |
          # 1. Initialiser le repo final s'il n'existe pas
          if [ ! -d "flatpak-repo-publish/$REPO_DIR" ]; then
            ostree init --mode=archive-z2 --repo=flatpak-repo-publish/$REPO_DIR
          else
            # Si le repo existe déjà (checkout git), s'assurer que les dossiers vides non suivis par git existent
            mkdir -p flatpak-repo-publish/$REPO_DIR/refs/remotes
            mkdir -p flatpak-repo-publish/$REPO_DIR/refs/heads
          fi

          # Fonction pour merger en conservant l'historique
          merge_repo() {
            local SOURCE_REPO=$1
            local ARCH=$2
            local REF="app/com.sharlychess.SharlyChess/${ARCH}/master"

            echo "Merging $ARCH..."

            # Use flatpak build-commit-from to import the commit and preserve history/metadata
            # This command automatically handles reparenting to the current tip of the destination branch
            flatpak build-commit-from --force \
              --src-repo=$SOURCE_REPO \
              --src-ref=$REF \
              --subject="Version ${VERSION} ($ARCH)" \
              --body="Automated build from GitHub Actions" \
              flatpak-repo-publish/$REPO_DIR $REF
          }

          # 2. Extraire et importer x86_64
          mkdir repo-x86
          tar -xzf repo-x86_64.tar.gz -C repo-x86
          merge_repo repo-x86/repo-staging x86_64

          # 3. Extraire et importer ARM64
          mkdir repo-arm
          tar -xzf repo-arm64.tar.gz -C repo-arm
          merge_repo repo-arm/repo-staging aarch64

          # 4. Récupérer l'ID GPG de manière robuste
          # Utilise --with-colons pour un format stable : sec::1:4096:1:KEYID:DATE:EXPIRE::
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep "^sec" | cut -d: -f5 | head -n 1)

          if [ -z "$GPG_KEY_ID" ]; then
            echo "Error: Could not detect GPG Key ID"
            exit 1
          fi

          # Export ID for next steps
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV
          echo "Detected GPG Key ID: $GPG_KEY_ID"

          # Signer explicitement les commits de l'application pour que Flatpak puisse les vérifier
          flatpak build-sign flatpak-repo-publish/$REPO_DIR com.sharlychess.SharlyChess --gpg-sign="$GPG_KEY_ID" --gpg-homedir="$HOME/.gnupg"

          # 5. Mettre à jour le sommaire et signer le tout
          # On ajoute --prune pour nettoyer les vieux objets et on s'assure que l'appstream est généré
          flatpak build-update-repo \
            --generate-static-deltas \
            --prune \
            --gpg-sign="$GPG_KEY_ID" \
            --gpg-homedir="$HOME/.gnupg" \
            flatpak-repo-publish/$REPO_DIR

          # 6. Générer les static deltas "from empty" pour accélérer la première installation
          # Sans cela, le premier install télécharge des milliers de petits objets un par un.
          # Avec le delta from-empty, tout est regroupé en quelques gros fichiers.
          for ARCH in x86_64 aarch64; do
            REF="app/com.sharlychess.SharlyChess/${ARCH}/master"
            if ostree rev-parse --repo=flatpak-repo-publish/$REPO_DIR $REF 2>/dev/null; then
              echo "Generating static delta from-empty for $ARCH..."
              ostree static-delta generate \
                --repo=flatpak-repo-publish/$REPO_DIR \
                --empty \
                $REF
            else
              echo "Skipping from-empty delta for $ARCH (ref not found)"
            fi
          done

          # Re-signer le summary après ajout des deltas from-empty
          flatpak build-update-repo \
            --gpg-sign="$GPG_KEY_ID" \
            --gpg-homedir="$HOME/.gnupg" \
            flatpak-repo-publish/$REPO_DIR

      - name: Generate .flatpakrepo files
        run: |
          # Create .nojekyll to prevent GitHub Pages from acting as Jekyll
          touch flatpak-repo-publish/.nojekyll

          # Export public key in binary format (essential for .flatpakrepo GPGKey field)
          gpg --export --export-options export-minimal "$GPG_KEY_ID" > public.gpg

          if [ ! -s public.gpg ]; then
            echo "Error: Exported public key is empty"
            exit 1
          fi

          GPG_BASE64=$(base64 -w 0 public.gpg)

          # Production .flatpakrepo (stable releases only)
          cat <<EOF > flatpak-repo-publish/sharly-chess.flatpakrepo
          [Flatpak Repo]
          Title=Sharly Chess
          Url=https://gilleshorn.github.io/sharly-chess/repo/
          Homepage=https://github.com/GillesHorn/sharly-chess
          Comment=Official repository for Sharly Chess
          Description=Play chess and manage tournaments with Sharly Chess
          GPGKey=$GPG_BASE64
          EOF

          # Dev .flatpakrepo (development builds)
          cat <<EOF > flatpak-repo-publish/sharly-chess-dev.flatpakrepo
          [Flatpak Repo]
          Title=Sharly Chess (Dev)
          Url=https://gilleshorn.github.io/sharly-chess/repo-dev/
          Homepage=https://github.com/GillesHorn/sharly-chess
          Comment=Development builds of Sharly Chess (may be unstable)
          Description=Development and testing builds for Sharly Chess
          GPGKey=$GPG_BASE64
          EOF

          rm public.gpg

      - name: Push to GitHub Pages
        working-directory: flatpak-repo-publish
        env:
          VERSION: ${{ needs.build-x86.outputs.version }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          # Include target (production/dev) and version in commit message
          if [ "$IS_PRODUCTION" = true ]; then
            TARGET_LABEL="production"
          else
            TARGET_LABEL="dev"
          fi
          COMMIT_MSG="Publish ${TARGET_LABEL}"
          if [ ! -z "$VERSION" ]; then
            COMMIT_MSG="$COMMIT_MSG - Version $VERSION"
          fi
          git commit -m "$COMMIT_MSG"

          # Robust push with retry — handles concurrent pushes on binary OSTree files
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            if git push origin gh-pages; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), rebasing on latest gh-pages..."
            # Abort any in-progress rebase from a previous attempt
            git rebase --abort 2>/dev/null || true
            # Fetch the latest gh-pages
            git fetch origin gh-pages
            # Soft reset to latest remote: keeps our working tree intact but moves HEAD
            git reset --soft origin/gh-pages
            # Re-stage and re-commit our changes on top of the new base
            git add .
            git commit -m "$COMMIT_MSG" || echo "Nothing new to commit"
          done
          echo "ERROR: Push failed after $MAX_RETRIES attempts"
          exit 1

  # Job de notification en cas d'échec de build ou de publication
  notify-failure:
    runs-on: ubuntu-latest
    needs: [build-x86, build-arm64, publish]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
            const version = '${{ needs.build-x86.outputs.version }}' || 'unknown';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `❌ Flatpak build failed — ${version}`,
              body: `## Build failure detected\n\n` +
                `The Flatpak build/publish pipeline has failed.\n\n` +
                `- **Version**: ${version}\n` +
                `- **Run**: [View logs](${runUrl})\n` +
                `- **Trigger**: \`${context.eventName}\`\n\n` +
                `### Action required\n` +
                `Check the [workflow logs](${runUrl}) to identify and fix the issue.\n`,
              labels: ['build-failure', 'bug']
            });

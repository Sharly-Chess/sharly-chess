name: PR Tests

permissions:
  contents: read

# NOTE(Amaras): This workflow file was generated by AI (GitHub Copilot, GPT-4.1).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
    test:
        if: github.event.pull_request.draft == false
        runs-on: windows-latest
        defaults:
            run:
                shell: pwsh

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                python-version: '3.12'

            - name: Install dependencies
              run: |
                python -m pip install --upgrade pip
                pip install -e .[tests,lint]

            - name: Run i18n_update
              run: |
                python scripts/i18n/i18n_update.py

            - name: Run Mypy
              run: |
                mypy src

            - name: Install Playwright browsers
              run: |
                python -m playwright install --with-deps chromium

            - name: Run tests
              run: |
                pytest -m "not release_only"

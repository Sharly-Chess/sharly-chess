name: Flatpak Build & Test

on:
  push:
    branches: [main, develop, dev]
    paths:
      - flatpak/**
      - requirements-flatpak.txt
      - .github/workflows/flatpak-test.yml
  pull_request:
    branches: [main, develop, dev]
    paths:
      - flatpak/**
      - requirements-flatpak.txt
  workflow_dispatch:

jobs:
  flatpak:
    name: Build & Test Flatpak
    runs-on: ubuntu-24.04
    env:
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
      LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            appstream-util \
            libcairo2-dev \
            libgirepository1.0-dev \
            gir1.2-gtk-3.0 \
            libgtk-3-dev \
            gobject-introspection \
            libglib2.0-dev \
            libffi-dev \
            ninja-build \
            meson \
            pkg-config \
            build-essential
          # Override the pkg-config metadata so pygobject sees a new-enough girepository
          # Ubuntu 24.04 ships with gobject-introspection 1.80.1 which corresponds to GLib 2.80.0
          # but the .pc file might still be named gobject-introspection-1.0 or have version 1.80.1.
          # PyGObject 3.48+ looks for girepository-2.0 >= 2.80.0.
          # We create a shim that points to the existing libs but reports version 2.80.0.
          sudo mkdir -p /usr/local/lib/pkgconfig
          cat <<EOF | sudo tee /usr/local/lib/pkgconfig/girepository-2.0.pc >/dev/null
          prefix=/usr
          libdir=/usr/lib/x86_64-linux-gnu
          includedir=/usr/include/gobject-introspection-1.0

          Name: GObject Introspection Repository
          Description: GObject Introspection repository library
          Version: 2.80.0
          Requires: gobject-introspection-1.0
          Libs: -L\${libdir} -lgirepository-1.0 -lgobject-2.0 -lglib-2.0
          Cflags: -I\${includedir} -I/usr/lib/x86_64-linux-gnu/glib-2.0/include -I/usr/include/glib-2.0
          EOF

      - name: Install GNOME runtimes (48)
        env:
          FLATPAK_USER_DIR: ${{ github.workspace }}/.flatpak
          XDG_RUNTIME_DIR: ${{ runner.temp }}/flatpak-runtime
        run: |
          mkdir -p "$FLATPAK_USER_DIR" "$XDG_RUNTIME_DIR"
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y --noninteractive flathub org.gnome.Platform//48
          flatpak --user install -y --noninteractive flathub org.gnome.Sdk//48

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:${{ env.PKG_CONFIG_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-flatpak.txt

      - name: Run Python checks
        run: |
          python flatpak/scripts/test_post_build.py
          python flatpak/testing/functional_tests.py

      - name: Build Flatpak
        run: |
          flatpak-builder \
            --repo=flatpak-repo \
            --force-clean \
            --verbose \
            build-flatpak \
            flatpak/configuration/com.sharlychess.SharlyChess.json 2>&1 | tee build.log

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            com.sharlychess.SharlyChess.flatpak \
            com.sharlychess.SharlyChess

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-build-log
          path: build.log
          retention-days: 7

      - name: Upload Flatpak bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: com.sharlychess.SharlyChess
          path: com.sharlychess.SharlyChess.flatpak
          retention-days: 7

name: Flatpak Build & Test

on:
  push:
    branches: [main, develop, dev]
    paths:
      - flatpak/**
      - requirements-flatpak.txt
      - src/**
      - .github/workflows/flatpak-test.yml
  pull_request:
    branches: [main, develop, dev]
    paths:
      - flatpak/**
      - requirements-flatpak.txt
      - src/**
  workflow_dispatch:

jobs:
  flatpak:
    name: Build & Test Flatpak
    runs-on: ubuntu-24.04
    env:
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
      LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up environment variables
        run: |
          echo "FLATPAK_USER_DIR=${{ github.workspace }}/.flatpak" >> $GITHUB_ENV
          echo "XDG_RUNTIME_DIR=${{ runner.temp }}/flatpak-runtime" >> $GITHUB_ENV

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flatpak \
            flatpak-builder \
            appstream-util \
            libcairo2-dev \
            libgirepository1.0-dev \
            libgirepository-2.0-dev \
            gir1.2-gtk-3.0 \
            libgtk-3-dev \
            gobject-introspection \
            libglib2.0-dev \
            libffi-dev \
            ninja-build \
            meson \
            pkg-config \
            build-essential

      - name: Install GNOME runtimes (48)
        run: |
          mkdir -p "$FLATPAK_USER_DIR" "$XDG_RUNTIME_DIR"
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y --noninteractive flathub org.gnome.Platform//48
          flatpak --user install -y --noninteractive flathub org.gnome.Sdk//48

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:${{ env.PKG_CONFIG_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-flatpak.txt

      - name: Run Python checks
        run: |
          python flatpak/scripts/test_post_build.py
          python flatpak/testing/functional_tests.py

      - name: Inject secrets into Flatpak manifest
        env:
          FFE_HOST: ${{ secrets.FFE_SQL_SERVER_HOST }}
          FFE_USER: ${{ secrets.FFE_SQL_SERVER_USER }}
          FFE_PASSWORD: ${{ secrets.FFE_SQL_SERVER_PASSWORD }}
          FFE_DATABASE: ${{ secrets.FFE_SQL_SERVER_DATABASE }}
          CHESS_RESULTS_KEY: ${{ secrets.CHESS_RESULTS_ENCRYPTION_KEY }}
          CHESS_RESULTS_IV: ${{ secrets.CHESS_RESULTS_ENCRYPTION_IV }}
        run: |
          jq '(.modules |= map(if .name == "sharly-chess" then .["build-options"] += {
            "env": {
              "FFE_HOST": env.FFE_HOST,
              "FFE_USER": env.FFE_USER,
              "FFE_PASSWORD": env.FFE_PASSWORD,
              "FFE_DATABASE": env.FFE_DATABASE,
              "CHESS_RESULTS_KEY": env.CHESS_RESULTS_KEY,
              "CHESS_RESULTS_IV": env.CHESS_RESULTS_IV
            }
          } else . end))' flatpak/configuration/com.sharlychess.SharlyChess.json > manifest.tmp
          mv manifest.tmp flatpak/configuration/com.sharlychess.SharlyChess.json

      - name: Build Flatpak
        run: |
          set -o pipefail
          flatpak-builder \
            --repo=flatpak-repo \
            --force-clean \
            --verbose \
            build-flatpak \
            flatpak/configuration/com.sharlychess.SharlyChess.json 2>&1 | tee build.log

      - name: Create Flatpak bundle
        run: |
          flatpak build-bundle \
            flatpak-repo \
            com.sharlychess.SharlyChess.flatpak \
            com.sharlychess.SharlyChess

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-build-log
          path: build.log
          retention-days: 7

      - name: Upload Flatpak bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: com.sharlychess.SharlyChess
          path: com.sharlychess.SharlyChess.flatpak
          retention-days: 7

[build-system]
requires = ["setuptools >= 75.5.0", "requests ~= 2.32.3",]
build-backend = "setuptools.build_meta"

[project]
name = "Papi-web"
description = "An application to help chess arbiters and organizers manage their tournaments"
requires-python = ">=3.11.0"
version = "2.4.25"

authors = [
  {name = "Pascal Aubry", email = "papi-web@echecs-bretagne.fr"},
  {name = "Sammy Plat", email = "papi-web@echecs-bretagne.fr"},
  {name = "Timothy Armes", email = "tim@timothyarmes.com"},
  {name = "Youri Aubry"},
]
license = { text = "AGPL v3.0" }
readme = "README.md"
dependencies = [
  "AdvancedHTMLParser ~= 9.0.2",
  "XlsxWriter ~= 3.2.2",
  "babel ~= 2.16.0",
  "chardet ~= 5.2.0",
  "colorama ~= 0.4.6",
  "colorlog ~= 6.9.0",
  "cryptography ~= 44.0.0",
  "python-dateutil ~= 2.9.0",
  "httpdate ~= 1.2.0",
  "Jinja2 ~= 3.1.5",
  "litestar ~= 2.14.0",
  "pefile >= 2024.8.26",
  "phonenumbers ~= 8.13.52",
  "pluggy ~= 1.5.0",
  "pyexcel-ods3 ~= 0.6.1",
  "pyodbc ~= 5.2.0",
  "pywin32-ctypes ~= 0.2.3",
  "requests ~= 2.32.3",
  "transformers ~= 4.47.1",
  "trf @ https://github.com/papi-web-org/TRF/archive/refs/tags/v1.1.3-unofficial.zip",
  "uvicorn ~= 0.34.0",
  "validators ~= 0.34.0",
  "wheel >= 0.45.1",
]

[project.optional-dependencies]
lint = [
  "ruff",
  "validate-pyproject",
  "pipdeptree",
]

translate = [
  "torch",
  "sentencepiece",
  "sacremoses",
]

export = [
  "PyInstaller",
]

tests = [
  "pytest",
]

[tool.ruff.format]
quote-style = "single"
[build-system]
requires = ["setuptools >= 75.5.0"]
build-backend = "setuptools.build_meta"

[project]
name = "Papi-web"
description = "An application to help chess arbiters and organizers manage their tournaments"
requires-python = ">=3.11.0"
version = "2.4.14"
authors = [
  {name = "Pascal Aubry", email = "papi-web@echecs-bretagne.fr"},
  {name = "Sammy Plat", email = "papi-web@echecs-bretagne.fr"},
  {name = "Timothy Armes", email = "tim@timothyarmes.com"},
]
license = { text = "AGPL v3.0" }
readme = "README.md"
dependencies = [
  "AdvancedHTMLParser ~= 9.0.2",
  "babel ~= 2.16.0",
  "chardet ~= 5.2.0",
  "colorama ~= 0.4.6",
  "colorlog ~= 6.9.0",
  "cryptography ~= 44.0.0",
  "httpdate ~= 1.2.0",
  "Jinja2 ~= 3.1.5",
  "litestar ~= 2.13.0",
  "pefile >= 2024.8.26",
  "pyodbc ~= 5.2.0",
  "pywin32-ctypes ~= 0.2.3",
  "requests ~= 2.32.3",
  "transformers ~= 4.47.1",
  "Unidecode ~= 1.3.8",
  "uvicorn ~= 0.34.0",
  "validators ~= 0.34.0",
  "wheel ~= 0.45.1",
]

[project.optional-dependencies]
dev = [
  # Initial version SP
  "ruff", "pipdeptree",
  # Needed to run models to generate translations for new locales (PA 20250103)
  "transformers", "torch", "sentencepiece", "sacremoses",
  # Needed to validate the dependencies of the project (work in progress, nothing works yet)
  "validate-pyproject", "toml", "packaging",
  # Needed to export to EXE
  "PyInstaller",
]


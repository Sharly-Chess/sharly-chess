name: Flatpak Build & Test

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'flatpak/**'
      - 'requirements-flatpak.txt'
      - 'src/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'flatpak/**'
      - 'requirements-flatpak.txt'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate Flatpak Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Run manifest validation
        run: |
          python3 flatpak/scripts/validate.py
      
      - name: Run functional tests
        run: |
          python3 flatpak/testing/functional_tests.py
  
  build-test:
    name: Build Test (Dry-run)
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install flatpak tools
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
      
      - name: Setup Flathub repository
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      
      - name: Install GNOME runtime
        run: |
          flatpak install -y --noninteractive flathub org.gnome.Platform//45
          flatpak install -y --noninteractive flathub org.gnome.Sdk//45
      
      - name: Validate manifest JSON
        run: |
          python3 -m json.tool flatpak/configuration/com.sharlychess.SharlyChess.json > /dev/null
          echo "✓ Manifest JSON is valid"
      
      - name: Check requirements file syntax
        run: |
          python3 -m pip install --dry-run -r requirements-flatpak.txt || true
          echo "✓ Requirements file syntax is valid"
      
      - name: Lint manifest with flatpak-builder
        run: |
          flatpak-builder --lint build-test flatpak/configuration/com.sharlychess.SharlyChess.json || echo "Lint check completed"
  
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: Check for hardcoded credentials
        run: |
          if grep -r "password\|secret\|token" flatpak/ --include="*.json" --include="*.py" | grep -v "# " ; then
            echo "⚠ Warning: Possible hardcoded credentials found"
            exit 1
          else
            echo "✓ No obvious hardcoded credentials"
          fi
      
      - name: Validate AppData schema
        run: |
          python3 << 'EOF'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          
          appdata = Path('flatpak/configuration/com.sharlychess.SharlyChess.appdata.xml')
          try:
              tree = ET.parse(appdata)
              root = tree.getroot()
              
              required_elements = [
                  'id',
                  'metadata_license',
                  'project_license',
                  'name',
                  'summary'
              ]
              
              for elem in required_elements:
                  if root.find(elem) is None:
                      raise ValueError(f"Missing required element: {elem}")
              
              print("✓ AppData XML is valid")
          except Exception as e:
              print(f"✗ AppData XML validation failed: {e}")
              exit(1)
          EOF
  
  documentation:
    name: Check Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify documentation files exist
        run: |
          files=(
            "flatpak/documentation/01-ANALYSE_REPOSITORY.md"
            "flatpak/documentation/02-ANALYSE_FLATPAK_FEASIBILITY.md"
            "flatpak/scripts/launcher.py"
            "flatpak/scripts/validate.py"
            "flatpak/testing/functional_tests.py"
          )
          
          for file in "${files[@]}"; do
            if [ -f "$file" ]; then
              echo "✓ $file exists"
            else
              echo "✗ $file not found"
              exit 1
            fi
          done
      
      - name: Check README.md
        run: |
          if [ -f "flatpak/README.md" ]; then
            echo "✓ Flatpak README.md exists"
          else
            echo "⚠ Flatpak README.md not found (optional)"
          fi

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: [validate, build-test, security, documentation]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Generate build report
        run: |
          echo "# Flatpak Build Report" > /tmp/report.md
          echo "" >> /tmp/report.md
          echo "**Date:** $(date)" >> /tmp/report.md
          echo "**Branch:** ${{ github.ref }}" >> /tmp/report.md
          echo "**Commit:** ${{ github.sha }}" >> /tmp/report.md
          echo "" >> /tmp/report.md
          echo "## Test Results" >> /tmp/report.md
          echo "- Validation: ${{ needs.validate.result }}" >> /tmp/report.md
          echo "- Build Test: ${{ needs.build-test.result }}" >> /tmp/report.md
          echo "- Security: ${{ needs.security.result }}" >> /tmp/report.md
          echo "- Documentation: ${{ needs.documentation.result }}" >> /tmp/report.md
          cat /tmp/report.md
      
      - name: Comment on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = `## Flatpak Build Check
            
            **Validation:** ${{ needs.validate.result }}
            **Build Test:** ${{ needs.build-test.result }}
            **Security:** ${{ needs.security.result }}
            **Documentation:** ${{ needs.documentation.result }}
            
            See CI logs for details.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

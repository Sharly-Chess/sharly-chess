<div
    class="alert message-{% block type %}{{ type }}{% endblock %} alert-dismissible fade show p-2 d-flex align-items-start gap-3 {{ alert_classes }}"
    role="alert"
    {% if auto_remove %}
        remove-me="10s"
    {% endif %}
>
    {% block alert_content %}
        <div class="flex-grow-1 align-self-center">
            {{ message | safe }}
        </div>
    {% endblock %}
    {% block remove_button %}
        {% if not hide_remove_button %}
            <button
                type="button"
                class="btn-close position-static p-0"
                style="margin: 4px 0 0 0;"
                data-bs-dismiss="alert"
                aria-label="{{ _('Hide') }}"
            ></button>
        {% endif %}
    {% endblock %}
</div>

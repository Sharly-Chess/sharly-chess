{% extends '/admin/print/place_cards/_.html' %}

{% block cards %}
    {% for player in players %}
        <div class="card-wrapper">
            <div class="card">
                <div class="card-cell top left"></div>
                <div class="card-cell top center"></div>
                <div class="card-cell top right"></div>
                <div class="card-cell middle left"></div>
                <div class="card-content">
                    {% for item in items %}
                        {{ item.render_html(event=event, tournament=tournament, board=none, player=player) | safe }}
                    {% endfor %}
                </div>
                <div class="card-cell middle right"></div>
                <div class="card-cell bottom left"></div>
                <div class="card-cell bottom center"></div>
                <div class="card-cell bottom right"></div>
            </div>
        </div>
    {% endfor %}
{% endblock %}

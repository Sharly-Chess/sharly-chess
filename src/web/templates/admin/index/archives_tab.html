<div id="top-nav-wrapper">
    <div id="top-nav-content">
        <div class="flex-grow-1"></div>
        <div class="d-flex gap-2 ms-auto align-items-center">
            {% include 'create_event_button.html' %}
        </div>
    </div>
</div>

<div class="d-flex mb-2 align-items-center flex-wrap gap-1">
</div>

<table class="mt-5 table prominent table-striped w-auto bg-light mx-auto justify-content-center">
    <thead class="table-dark position-sticky top-0 z-2">
        <tr>
            <th scope="col" class="text-nowrap">{{ _('Archived event') }}</th>
            <th scope="col">{{ _('Deletion date') }}</th>
            <th>{# Restore button #}</th>
        </tr>
    </thead>
    <tbody>
        {% if nav_tab.archives %}
            {% for archive in nav_tab.archives %}
                <tr>
                    <th scope="row" class="text-nowrap">{{ archive.name }}</th>
                    <td>{{ archive.date_str }}</td>
                    <td>
                        <span {{ macros.tooltip_attributes('info', _('Restore'), 'right') }}>
                            <button
                                class="btn btn-sm btn-outline-primary"
                                hx-post="{{ url_for('admin-restore-archive', archive_name=archive.name) }}"
                                hx-target="body"
                                hx-indicator="#please-wait"
                            >
                                {{ _('Restore') }}
                            </button>
                        </span>
                    </td>
                </tr>
            {% endfor %}
        {% else %}
            <tr>
                <th scope="row" class="text-nowrap" colspan="2">{{ nav_tab.empty_str }}</th>
            </tr>
        {% endif %}
    </tbody>
</table>

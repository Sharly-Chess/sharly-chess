<table
    id="pairings-table"
    class="pairings-table table prominent table-striped table-sm table-hover w-100 bg-light {% if safety_mode != 'SAFE' %}table-danger-header{% endif %}"
>
    {% include '/admin/pairings/pairing_table_header.html' %}
    {% for team_board in admin_team_boards %}
        {% include '/admin/pairings/team_block.html' %}
    {% endfor %}
    {% if not admin_team_boards %}
        <tbody>
            <tr><td colspan="99" class="text-center text-muted p-3">
                {{ _('No team pairings for this round yet.') }}
            </td></tr>
        </tbody>
    {% endif %}
</table>

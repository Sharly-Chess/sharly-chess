<div class="col-12 mb-3">
    {{ admin_macros.switch_input(
        name=option.id,
        label='',
        placeholder=option.field_placeholder,
        help_text='',
        data=data, errors=errors
    ) }}
</div>
<script>
    $('#{{ option.id|replace('_', '-') }}').on('change', (event) => {
        if (event.target.checked) {
            $('#{{ option.other_field_id|replace('_', '-') }}').prop('checked', false);
        }
    });
</script>

<div class="modal-dialog modal-dialog-centered admin-create-papi-modal d-block">
    <form
        hx-post="{{ url_for('admin-tournament-papi-create', event_uniq_id=admin_event.uniq_id, tournament_id=admin_tournament.id) }}"
        hx-target="body"
        hx-indicator="#please-wait"
    >
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">
                    {{ _('Missing Papi file') }}
                </h2>
            </div>
            <div class="modal-body">
                <h5 class="text-danger">
                    {{ _('Warning: Papi file [%(path)s] not found, many features are disabled.', path=admin_tournament.file) }}
                </h5>
                <h5>{{ _('Do you want Papi-web to create the file?') }}</h5>
            </div>
            <div class="modal-footer d-block">
                <div class="d-flex flex-wrap gap-4">
                    <div class="d-flex gap-2 flex-grow-1">
                        <button
                            type="submit"
                            class="text-nowrap white btn btn-primary"
                        >
                            <i class="bi-plus-circle-fill pe-1"></i>
                            {{ _('Yes, create the file') }}
                        </button>
                    </div>
                    <div>
                        <button
                            type="button"
                            hx-get="{{ url_for('admin-event-tab', event_uniq_id=admin_event.uniq_id, admin_event_tab='tournaments') }}"
                            preload
                            hx-target="body"
                            hx-indicator="#please-wait"
                            class="btn btn-secondary text-nowrap"
                        >
                            <i class="bi-x-circle-fill pe-1"></i>
                            {{ _('No, I will do it later') }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

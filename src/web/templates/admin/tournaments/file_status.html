{% if file_exists %}
    <div class="mt-2 pt-1">
        <i class="text-success bi-check-circle-fill me-1"></i>
        {{ _('File found') }}
    </div>
{% else %}
    <div>
        <div class="mb-1">
            <i class="text-danger bi-x-circle-fill me-1"></i>
            {{ _('File not found') }}
        </div>
        <div class="ms-1">
            <input id="create-file" type="checkbox" name="create_file">
            <label for="create-file" class="form-check-label ms-1">
                {{ _('Create file') }}
            </label>
        </div>
    </div>
    <script>
        $('#create-file').on('change', (event) => {
            $('.file-exists').each((_, element) => {
                const tooltip = new bootstrap.Tooltip(element);
                const inputElement = $(element).find('select, input')[0];
                if (event.target.checked) {
                    inputElement.disabled = false;
                    tooltip.disable();
                } else {
                    inputElement.disabled = true;
                    tooltip.enable();
                }
            });
        });
    </script>
{% endif %}
<script>
    $('.file-exists').each((_, element) => {
        $(element).find('select, input')[0].disabled = {% if file_exists %}false{% else %}true{% endif %};
        const tooltip = new bootstrap.Tooltip(element);
        tooltip.{% if file_exists %}disable(){% else %}enable(){% endif %};
    });
</script>

<td class="{% if not entity.active %}text-secondary{% endif %}">
    {{ role.name }}
</td>
<td class="{% if not entity.active %}text-secondary{% endif %}">
    {% if role.has_tournament_scope %}
        {% set permission=entity.permissions_by_role[role] %}
        {% if permission.tournament_ids %}
            {{ client.permission_tournament_names(permission) }}
        {% else %}
            {{ _('All the tournaments') }}
        {% endif %}
    {% else %}
        {{ role.scope.name }}
    {% endif %}
</td>

<div class="col-12 col-lg-6 col-xl-4 mb-3 d-flex align-items-stretch">
    <div
        class="card {% if card_url %}btn{% endif %} p-1 w-100 {{ card_class }}"
        {% if card_url %}
            hx-get="{{ card_url }}"
            preload
            hx-target="body"
            hx-indicator="#please-wait"
            hx-trigger="click, keyup[key=='Enter'], keyup[key==' ']"
            tabindex="0"
        {% endif %}
    >
        <div class="card-header text-center fs-5 text-primary">
            {% block card_header %}
                CARD_HEADER
            {% endblock %}
        </div>
        <div
            class="card-body p-2 d-flex flex-column"
        >
            <div class="card-title text-center fw-bold">
                {% block card_title %}
                    CARD_TITLE
                {% endblock %}
            </div>
            <div class="card-text mb-auto mt-1 text-start mb-3 pb-2">
                {% block card_text %}
                    CARD_TEXT
                {% endblock %}
            </div>
            <div class="d-flex flex-wrap card-buttons mt-auto pt-3 align-self-start w-100 gap-3">
                <div class="flex-grow-1 d-flex gap-2">
                    {% block card_buttons_left %}
                        CARD_BUTTON_LEFT
                    {% endblock %}
                </div>
                <div class="d-flex gap-2 ms-auto">
                    {% block card_buttons_right %}
                        CARD_BUTTON_RIGHT
                    {% endblock %}
                </div>
            </div>
        </div>
    </div>
</div>

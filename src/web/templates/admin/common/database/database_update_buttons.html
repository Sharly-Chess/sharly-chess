<div class="d-flex gap-2 justify-content-end">
    <button
        type="button"
        class="btn btn-outline-danger btn-sm d-inline-flex gap-2 align-items-center"
        {% if updating %}
            disabled
        {% endif %}
        hx-get="{{ url_for('admin-database-delete', database_id=database_id) }}"
        hx-target="closest div"
        hx-swap="outerHTML"
    >
        <i class="bi-trash-fill"></i>
    </button>
    <button
        type="button"
        class="btn btn-outline-primary btn-sm d-inline-flex gap-2 align-items-center"
        {% if updating %}
            disabled
            hx-get="{{ url_for('admin-database-status', database_id=database_id) }}"
            hx-trigger="every 10s"
        {% else %}
            hx-post="{{ url_for('admin-database-update', database_id=database_id) }}"
        {% endif %}
        hx-target="closest div"
        hx-swap="outerHTML"
    >
        <i
            class="bi bi-arrow-clockwise lh-1"
            {% if updating %}
                style="
                    animation: spin 1s infinite;
                    animation-timing-function: linear;"
            {% endif %}
        ></i>
        {{ _('Update now') }}
    </button>
</div>

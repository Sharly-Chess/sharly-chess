<div class="modal-dialog modal-dialog-centered admin-event-edit-modal d-block">
    <form
        hx-target="body"
        hx-post="{{ url_for('admin-event-print', event_uniq_id=admin_event.uniq_id) }}"
        hx-indicator="#please-wait"
    >
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">
                    {{ _('Print') }}
                </h2>
            </div>
            <div class="modal-body">
                <h4 class="mt-3">
                    {{ _('Tournament') }}
                </h4>
                <div class="row">
                    <div class="col-12 mb-3">
                        {{ admin_macros.select_input(
                            name='tournament_id',
                            label=_('Tournament:'),
                            help_text=_('The tournament to print.') if action != 'delete' else '',
                            select_options=tournament_options,
                            data=data, errors=errors
                        ) }}
                    </div>
                </div>
            </div> 

            <div class="modal-footer d-block">
                <div class="row">
                    <div class="col col-6 text-start">
                        <button
                            type="submit"
                            class="text-nowrap white btn {% if action == 'delete' %}btn-danger{% else %}btn-primary{% endif %}"
                        >
                            <i class="bi-print-fill pe-1"></i>
                            {{ _('Print') }}
                        </button>
                    </div>
                    <div class="col col-6 text-end">
                        <button
                            type="button"
                            class="btn btn-secondary text-nowrap"
                            data-bs-dismiss="modal"
                            hx-get="{{ url_for('close-modal') }}"
                            hx-trigger="click, keyup[key=='Escape'] from:body"
                        >
                            <i class="bi-x-circle-fill pe-1"></i>
                            {{ _('Cancel') }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

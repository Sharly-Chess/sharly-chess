<div class="col-12">
    {{ admin_macros.select_input(
        name=option.id,
        label=_('Template:'),
        help_text=_('The Place Card template to use.'),
        select_options={},
        data=data, errors=errors
    ) }}
</div>

<script>
    $(document).ready(function() {
        const placeCardTypeSelect = $('.modal #place-card-type');
        const placeCardTemplateSelect = $('.modal #{{option.id}}');

        const placeCardTemplatesPerType = {{ option.place_card_templates_per_type | tojson }};

        function updatePlaceCardTemplates() {
            const placeCardTypeId = placeCardTypeSelect.val();
            const placeCardTemplates = placeCardTemplatesPerType[placeCardTypeId] || [];

            placeCardTemplateSelect.empty();

            placeCardTemplateSelect.append(
                $('<option>', {
                    value: '',
                    text: '-- {{ _("Select template") }} --',
                })
            );

            // Add templates
            placeCardTemplates.forEach(placeCardTemplate => {
                placeCardTemplateSelect.append(
                    $('<option>', {
                        value: placeCardTemplate.id,
                        text: placeCardTemplate.name,
                    })
            );

            placeCardTemplateSelect.prop('disabled', false);
        });
        }

        placeCardTypeSelect.on('change', updatePlaceCardTemplates);
        updatePlaceCardTemplates();
    })
</script>

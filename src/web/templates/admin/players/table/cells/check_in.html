{% set can_check_in = client.can_check_in_players(tournament.id) %}
{% set check_in_status = tournament_player.check_in_status %}
{% if check_in_status != 0 %}
    <i
        data-testid="check-in-cell"
        {% if check_in_status == 1 %}
            class="bi-ban text-secondary"
            {{ macros.tooltip_attributes(
                'warning', _(
                    'Player [%(player)s] is absent for the next round in tournament [%(tournament)s].',
                    player=player.full_name, tournament=tournament.name
                ), 'right'
            ) }}
        {% else %}
            {% if can_check_in %}
                {% if tournament_player.check_in %}
                    class="bi-check-circle-fill text-success cursor-pointer"
                    {{ macros.tooltip_attributes('info', _('Click to check-out the player.'), 'right') }}
                {% else %}
                    class="bi-circle-fill text-warning cursor-pointer"
                    {{ macros.tooltip_attributes('info', _('Click to check-in the player.'), 'right') }}
                {% endif %}
                hx-patch="{{ url_for(
                    'admin-player-check-in-out',
                    event_uniq_id=admin_event.uniq_id,
                    player_id=player.id,
                    check_in=(not tournament_player.check_in)|int
                ) }}"
                onclick="isNextRefreshMessageIgnored = true;"
                hx-on::before-request="$('#player-{{ player.id }} td').addClass('text-secondary');"
                hx-swap="multi:#players-table-header,#player-{{ player.id }}:outerHTML,#players-table-empty-row:outerHTML"
                hx-indicator="#please-wait"
            {% else %}
                {% if tournament_player.check_in %}
                    class="bi-check-circle-fill text-success"
                    {{ macros.tooltip_attributes('warning', _('You are not allowed to check-out the player.'), 'right') }}
                {% else %}
                    class="bi-circle-fill text-warning"
                    {{ macros.tooltip_attributes('info', _('Click to check-in the player.'), 'right') }}
                {% endif %}
            {% endif %}
        {% endif %}
    ></i>
{% endif %}

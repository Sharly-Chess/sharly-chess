<img
    src="{{ url_for('static', file_path='/images/fide-light.svg') }}?version={{ sharly_chess_config.version }}"
    style="height: 1.2em"
    class="p-0 {% if player.fide_id %}cursor-pointer{% else %}fide-id-none{% endif %}"
    {% if player.fide_id %}
        {{ macros.tooltip_attributes('info', _('FIDE ID: %(fide_id)s (click to copy to the clipboard).', fide_id=player.fide_id), 'left') }}
        onclick="navigator.clipboard.writeText('{{ player.fide_id }}')"
    {% else %}
        {{ macros.tooltip_attributes('warning', _('No FIDE ID.'), 'left') }}
    {% endif %}
/>

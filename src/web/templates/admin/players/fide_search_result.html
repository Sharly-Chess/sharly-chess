{% import '/common/macros.j2' as macros with context %}

<img
    class="player-federation-flag pe-1"
    src="{{ macros.federation_flag_url(player.federation) }}"
/>
{{ player.fide_id }}
<span class="fw-bold">
    {{ player.full_name }}
</span>
{% if player.year_of_birth %}
    ({{ player.year_of_birth }}, {{ player.category.short_name }})
{% endif %}
- {{ player.standard_rating_str }}

<div
    class="
        player-cell
        {% if (
            is_input and
            last_check_in_updated and
            last_check_in_updated.expiration > now and
            last_check_in_updated.tournament_id == tournament.id and
            last_check_in_updated.player_id == player.id
        ) %}
            last_check_in_updated
        {% endif %}
        {% if check_in_enabled %}cursor-pointer{% endif %}
        overflow-hidden text-nowrap"
    style="text-overflow: ellipsis;"
    {% if check_in_enabled %}
        hx-get="{{ url_for(
            'user-checkin-modal',
            event_uniq_id=user_event.uniq_id,
            display_controller_id=display_controller.id,
            tournament_id=tournament.id,
            player_id=player.id
        ) if display_controller else url_for(
            'user-checkin-modal',
            is_screen=1,
            event_uniq_id=user_event.uniq_id,
            screen_uniq_id=screen.uniq_id,
            tournament_id=tournament.id,
            player_id=player.id
        ) }}"
        hx-target="body"
        hx-indicator="#please-wait"
        data-bs-toggle="modal"
        data-bs-target="#modal-wrapper"
    {% endif %}
>
    <i class="{% if player.check_in %}bi-check-square-fill{% else %}bi-square{% endif %}"></i>
    {% if player.title.short_name %}{{ player.title.short_name }}&nbsp;{% endif %}{{ player.full_name }} {{ player.rating_str }}
</div>

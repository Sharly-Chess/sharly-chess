{% set sce_data = tournament.plugin_data.sce %}
{% if not sce_data.id %}
    -
{% else %}
    <span class="d-flex justify-content-center gap-1">
        <div class="form-check form-switch d-inline-block">
            <input
                name="tournament_{{ tournament.id }}_sce_check_in_open"
                class="form-check-input mt-2"
                type="checkbox"
                hx-post="{{ url_for(
                    'sce-toggle-tournament-check-in-open',
                    event_uniq_id=admin_event.uniq_id,
                    tournament_id=tournament.id,
                ) }}"
                hx-indicator="#please-wait"
                {% if sce_data.check_in_open %}checked{% endif %}
            />
        </div>
        {% set has_schedule = sce_data.check_in_opens_at or sce_data.check_in_closes_at %}
        <i
            class="bi-stopwatch-fill pt-1{% if not has_schedule %} text-secondary{% endif %}"
            style="font-size: 110%"
            {{ macros.tooltip_attributes('', (
                sce_data.check_in_schedule_tooltip if has_schedule else _('Not scheduled')
            ), 'right') }}
        ></i>
    </span>

{% endif %}

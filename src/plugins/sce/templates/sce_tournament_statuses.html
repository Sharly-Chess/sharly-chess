{% import '/common/macros.j2' as macros with context %}

{% for tournament_status in sce_utils.resolve_tournament_upload_statuses(tournament) %}
    <span
        class="badge rounded-pill {{ tournament_status.css_classes }}"
        {% if tournament_status.tooltip %}
            {{ macros.tooltip_attributes('', tournament_status.tooltip, 'top') }}
        {% endif %}
    >
        {{ tournament_status.name }}
    </span>
{% endfor %}

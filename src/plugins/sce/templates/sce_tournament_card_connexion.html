<div class="d-flex gap-2">
    <img
        src="{{ url_for('static', file_path='/images/sharly-chess-events.ico') }}?version={{ sharly_chess_config.version }}"
        style="height: 1.2em"
        class="p-0"
        {{ macros.tooltip_attributes('', 'Sharly-Chess.com') }}
    />
    {{ _('Sharly-Chess.com tournament') }} -
    <a
        href="{{ sce_utils.tournament_public_url(tournament) }}"
        target="_blank"
        {{ macros.tooltip_attributes('', _('Public page of the tournament.')) }}
    ><i class="bi bi-box-arrow-up-right"></i></a>
    <a
        href="{{ sce_utils.tournament_private_url(tournament) }}"
        target="_blank"
        {{ macros.tooltip_attributes('', _('Configuration page of the tournament.')) }}
    ><i class="bi bi-gear-fill"></i></a>
    {% set auto_upload = sce_utils.resolve_tournament_auto_upload(tournament) %}
    <i
        class="bi-cloud-arrow-up-fill {% if not auto_upload %}text-secondary{% endif %}"
        style="transform: scale(1.1)"
        {{ macros.tooltip_attributes(
            '', _('Auto-upload enabled') if auto_upload else _('Auto-upload disabled'), 'top'
        ) }}
    ></i>
</div>

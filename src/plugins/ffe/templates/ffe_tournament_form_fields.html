<h4>
    {{ _('Connection French Chess Federation') }}
</h4>
{% include 'ffe_tournament_ffe_auth_fields.html' %}
<div class="row gy-2 gx-3">
    <div class="col-12 col-md-6">
        {{ admin_macros.select_input(
            name='ffe_auto_upload',
            label=_('Auto-upload:'),
            help_text='',
            select_options=ffe_auto_upload_options,
            data=data, errors=errors
        ) }}
    </div>
</div>
<input type="hidden" name="player_rating_type" value="3">

<script>
    $('#player-rating-type').val('3');
    const ratingTypeContainer = document.getElementById('player-rating-type-container');
    new bootstrap.Tooltip(ratingTypeContainer, {
        title: '{{ _('The FFE always uses the FIDE rating when available.') }}',
        placement: 'top',
    });
    $('#player-rating-type').prop('disabled', true);
</script>

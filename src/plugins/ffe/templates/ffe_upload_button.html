<button
    id="ffe-upload-button"
    class="nav-link text-start d-flex align-items-center"
    hx-get="{{ url_for('ffe-upload-modal', event_uniq_id=admin_event.uniq_id) }}"
    hx-target="body"
    hx-indicator="#please-wait"
    preload
    data-bs-toggle="modal"
    data-bs-target="#modal-wrapper"
>
    <i class="bi bi-cloud-arrow-up-fill pe-1"></i>
    <span class="pe-2">
        {{ _('Upload to the FFE') }}
    </span>
    <span
        class="nav-icon-badge rounded-circle bg-danger {% if has_upload_error %}visible{% else %}invisible{% endif %}"
        style="font-size: 15px;"
    >
        {% if has_upload_error %}
            <i class="bi bi-exclamation"></i>
        {% endif %}
    </span>
</button>

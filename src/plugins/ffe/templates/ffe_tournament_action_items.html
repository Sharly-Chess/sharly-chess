<li class="dropdown-submenu">
    <button class="dropdown-item d-flex justify-content-between">
        <span>
            <img
                src="{{ url_for('static', file_path='/images/ffe.png') }}"
                style="height: 1.2em"
                class="pe-1"
            />
            {{ _('FFE site') }}
        </span>
        <i class="ps-3 bi bi-caret-right-fill"></i>
    </button>
    <ul class="dropdown-menu">
        <li>
            <span
                {% if not client.can_publish_results %}
                    {{ macros.tooltip_attributes('warning', _('You are not allowed to publish results.'), 'right') }}
                {% elif tournament.plugin_data.ffe.ffe_id %}
                    {{ macros.tooltip_attributes('info', _('By default, tournaments are not visible on the FFE site.'), 'right') }}
                {% else %}
                    {{ macros.tooltip_attributes('warning', _('FFE certification number and password not defined for tournament.'), 'right') }}
                {% endif %}
            >
                <button
                    class="dropdown-item text-nowrap"
                    {% if client.can_publish_results and tournament.plugin_data.ffe.ffe_id %}
                        hx-post="{{ url_for('ffe-make-visible', event_uniq_id=admin_event.uniq_id, tournament_id=tournament.id) }}"
                        hx-target="body"
                        hx-indicator="#please-wait"
                    {% else %}
                        disabled
                    {% endif %}
                >
                    <i class="bi bi-eye-fill pe-1"></i>
                    {{ _('Make visible on FFE site') }}
                </button>
            </span>
        </li>
        <li>
            <span
                {% if not client.can_publish_rules %}
                    {{ macros.tooltip_attributes('warning', _('You are not allowed to publish rules.'), 'right') }}
                {% elif tournament.plugin_data.ffe.ffe_id %}
                    {{ macros.tooltip_attributes('info', _('Uploading the PDF rules file allows the players to read the rules online.'), 'right') }}
                {% else %}
                    {{ macros.tooltip_attributes('warning', _('FFE certification number and password not defined for tournament.'), 'right') }}
                {% endif %}
            >
                <button
                    class="dropdown-item text-nowrap"
                    {% if client.can_publish_rules and tournament.plugin_data.ffe.ffe_id %}
                        hx-post="{{ url_for('ffe-upload-rules', event_uniq_id=admin_event.uniq_id, tournament_id=tournament.id) }}"
                        hx-target="body"
                        hx-indicator="#please-wait"
                    {% else %}
                        disabled
                    {% endif %}
                >
                    <i class="bi bi-file-earmark-arrow-up-fill pe-1"></i>
                    {{ _('Upload rules') }}
                </button>
            </span>
        </li>
        <li>
            <span
                {% if not client.can_download_fees %}
                    {{ macros.tooltip_attributes('warning', _('You are not allowed to download fees.'), 'right') }}
                {% elif tournament.plugin_data.ffe.ffe_id %}
                    {{ macros.tooltip_attributes('info', _('Download the fees that the organizer should pay to the FFE.'), 'right') }}
                {% else %}
                    {{ macros.tooltip_attributes('warning', _('FFE certification number and password not defined for tournament.'), 'right') }}
                {% endif %}
            >
                <button
                    id="ffe-extract-fees-button"
                    class="dropdown-item text-nowrap"
                    {% if client.can_download_fees and tournament.plugin_data.ffe.ffe_id %}
                        hx-get="{{ url_for('ffe-extract-fees', event_uniq_id=admin_event.uniq_id, tournament_id=tournament.id) }}"
                        hx-target="body"
                        hx-indicator="#please-wait"
                    {% else %}
                        disabled
                    {% endif %}
                >
                    <i class="bi bi-file-earmark-arrow-up-fill pe-1"></i>
                    {{ _('Download fees') }}
                </button>
            </span>
        </li>
    </ul>
</li>

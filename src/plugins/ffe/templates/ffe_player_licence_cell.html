{% import '/common/macros.j2' as macros with context %}
{% import '/ffe_macros.j2' as ffe_macros %}

<td class="text-nowrap text-center compact-col">
    <span
        {% if value.plugin_data.ffe.ffe_licence.value == 0 %}
            {{ macros.tooltip_attributes('error', value.plugin_data.ffe.ffe_licence.name, 'right') }}
        {% elif value.plugin_data.ffe.ffe_licence.value == 1 %}
            {{ macros.tooltip_attributes('warning', _('FFE licence: %(ffe_licence_number)s (expired).', ffe_licence_number=value.plugin_data.ffe.ffe_licence_number), 'right') }}
            class="cursor-pointer"
            onclick="navigator.clipboard.writeText('{{ value.plugin_data.ffe.ffe_licence_number }}')"
        {% elif value.plugin_data.ffe.ffe_licence.value in [2, 3] %}
            {{ macros.tooltip_attributes('info', _('FFE licence: %(ffe_licence_number)s (click to copy to the clipboard).', ffe_licence_number=value.plugin_data.ffe.ffe_licence_number), 'right') }}
            class="cursor-pointer"
            onclick="navigator.clipboard.writeText('{{ value.plugin_data.ffe.ffe_licence_number }}')"
        {% else %}
            {{ macros.tooltip_attributes('error', _('Unknown FFE Licence type [%(ffe_licence)s].', ffe_licence=value.plugin_data.ffe.ffe_licence), 'right') }}
        {% endif %}
    >
        {{ ffe_macros.ffe_licence(value.plugin_data.ffe.ffe_licence) }}
    </span>
</td>

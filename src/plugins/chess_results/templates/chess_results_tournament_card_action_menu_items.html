<li class="dropdown-submenu">
    <button class="dropdown-item d-flex justify-content-between">
        <span>
            <img
                src="{{ url_for('static', file_path='/images/chess-results.png') }}?version={{ sharly_chess_config.version }}"
                style="height: 1.2em"
                class="pe-1"
            />
            {{ _('Chess-Results.com') }}
        </span>
        <i class="ps-3 bi bi-caret-right-fill"></i>
    </button>
    <ul class="dropdown-menu">

        <li>
            <span
                {% if not client.can_publish_results %}
                    {{ macros.tooltip_attributes('warning', _('You are not allowed to publish results.'), 'right') }}
                {% endif %}
            >
                <button
                    class="dropdown-item text-nowrap"
                    {% if client.can_publish_results %}
                        hx-post="{{ url_for('chess-results-upload-single-tournament', event_uniq_id=admin_event.uniq_id, tournament_id=tournament.id) }}"
                        hx-target="body"
                        hx-indicator="#please-wait"
                    {% else %}
                        disabled
                    {% endif %}
                >
                    <i class="bi bi-cloud-arrow-up-fill pe-1"></i>
                    {{ _('Upload to Chess-Results.com') }}
                </button>
            </span>
        </li>
    </ul>
</li>

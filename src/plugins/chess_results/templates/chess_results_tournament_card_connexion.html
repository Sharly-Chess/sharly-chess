{% set tnr = cr_utils.get_tournament_plugin_data(tournament).tnr %}

<div class="d-flex gap-2">
    <img
        src="{{ url_for('static', file_path='/images/chess-results.png') }}?version={{ sharly_chess_config.version }}"
        style="height: 1.2em"
        class="p-0"
        {{ macros.tooltip_attributes('info', _('Chess-Results.com'), 'top') }}
    />
    {{ _('Tournament number: %(tnr)s', tnr=tnr) }}
    <a
        href="{{ cr_utils.tournament_public_url(tournament) }}"
        target="_blank"
        {{ macros.tooltip_attributes('', _('Public page of the tournament.')) }}
    ><i class="bi bi-box-arrow-up-right"></i></a>
    <a
        href="{{ cr_utils.tournament_private_url(tournament) }}"
        target="_blank"
        {{ macros.tooltip_attributes('', _('Configuration page of the tournament.')) }}
    ><i class="bi bi-gear-fill"></i></a>
    {% set auto_upload = cr_utils.resolve_auto_upload(tournament) %}
    <i
        class="bi-cloud-arrow-up-fill {% if not auto_upload %}text-secondary{% endif %}"
        style="transform: scale(1.1)"
        {{ macros.tooltip_attributes(
            'info', _('Auto-upload enabled') if auto_upload else _('Auto-upload disabled'), 'top'
        ) }}
    ></i>
</div>
